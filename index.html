<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="left">
        <div class="logobar">
            <img src="imgs/Logo.jpeg" width="100" alt="logo for tun1girl">
            <p>tun1girl</p>
        </div>
    </div>
    <div class="right">
        <h1>Template online service! Please sign up to send your info to absolutely no one.</h1>
        <h1>Awesome</h1>
        <form>
            <section class="one">
                <h2>Sign-up!</h2>
                <div class="inputs">
                    <div class="element">
                        <label for="firstName">FIRST NAME</label>
                        <input type="text" id="firstName" name="firstname" required>
                    </div>
                    <div class="element">
                        <label for="lastName">LAST NAME</label>
                        <input type="text" id="lastName" name="lastname" required>
                    </div>
                    <div class="element">
                        <label for="mail">EMAIL</label>
                        <input type="email" id="mail" name="email" required>
                    </div>
                    <div class="element">
                        <label for="phone">PHONE NUMBER</label>
                        <input type="tel" id="phone" name="phoneNumber" required>
                    </div>
                    <div class="element">
                        <label for="pswd">PASSWORD</label>
                        <input type="password" id="pswd" name="password" required minlength="5">
                    </div>
                    <div class="element">
                        <label for="cpswd">CONFIRM PASSWORD</label>
                        <input type="password" id="cpswd" name="cpassword" required minlength="5">
                    </div>
                </div>
            </section>
            <section class="two">
                <button type="submit">Create Account</button>
            </section>
        </form>
        <p>Already have an account? <a href="/">Log in</a></p>
    </div>
</body>

</html>
